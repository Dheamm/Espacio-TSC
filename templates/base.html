<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Espacio TSC{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/icons/motivado.svg" />
    <script>
      if (
        localStorage.theme === "dark" ||
        (!("theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              tsc: {
                50: "#f0f4ff",
                100: "#dde6fb",
                200: "#c3d0f7",
                300: "#99b0f1",
                400: "#6d89e8",
                500: "#4a64de",
                600: "#3448d3",
                700: "#2c3cbf",
                800: "#29359b",
                900: "#27317a",
              },
              sage: {
                50: "#f5f8f5",
                100: "#eef3ee",
                200: "#d8e8d8",
                300: "#b8d4b8",
                400: "#8fb98f",
                500: "#5a8a5a",
                600: "#4a7a4a",
                700: "#3a6b3a",
                800: "#2d5230",
                900: "#1f3a20",
              },
            },
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
              display: ["Georgia", "serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
      .htmx-indicator {
        opacity: 0;
        transition: opacity 200ms ease-in;
      }
      .htmx-request .htmx-indicator {
        opacity: 1;
      }
      .htmx-request.htmx-indicator {
        opacity: 1;
      }
      .fade-in {
        animation: fadeIn 0.3s ease-in;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      img.emoji {
        height: 1.2em;
        width: 1.2em;
        vertical-align: -0.2em;
        display: inline-block;
        filter: grayscale(1) sepia(1) hue-rotate(190deg) saturate(2)
          brightness(0.8);
      }
    </style>
  </head>
  <body
    class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col dark:bg-slate-900 dark:text-slate-100"
  >
    <header
      class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50 dark:bg-slate-900 dark:border-slate-800"
    >
      <nav
        class="max-w-5xl mx-auto px-3 sm:px-4 py-2 sm:py-3 flex items-center justify-between gap-2"
      >
        <a
          href="/"
          class="flex items-center gap-1.5 sm:gap-2 font-display font-bold text-tsc-700 text-base sm:text-xl tracking-tight dark:text-tsc-300 shrink-0"
        >
          <span>Espacio TSC</span>
        </a>
        <ul
          class="flex items-center gap-0.5 sm:gap-1 text-xs sm:text-sm font-medium"
        >
          <li>
            <a
              href="/"
              class="block px-2 py-1.5 sm:px-3 sm:py-2 rounded-lg text-slate-600 hover:text-tsc-700 hover:bg-tsc-50 transition-colors dark:text-slate-300 dark:hover:text-tsc-300 dark:hover:bg-slate-800"
            >
              Inicio
            </a>
          </li>
          <li>
            <a
              href="/foro"
              class="block px-2 py-1.5 sm:px-3 sm:py-2 rounded-lg text-slate-600 hover:text-tsc-700 hover:bg-tsc-50 transition-colors dark:text-slate-300 dark:hover:text-tsc-300 dark:hover:bg-slate-800"
            >
              <span class="sm:hidden">Foro</span>
              <span class="hidden sm:inline">Foro Clínico</span>
            </a>
          </li>
          <li>
            <a
              href="/recursos"
              class="block px-2 py-1.5 sm:px-3 sm:py-2 rounded-lg text-slate-600 hover:text-tsc-700 hover:bg-tsc-50 transition-colors dark:text-slate-300 dark:hover:text-tsc-300 dark:hover:bg-slate-800"
            >
              Recursos
            </a>
          </li>
          <li class="shrink-0">
            <button
              id="theme-toggle"
              type="button"
              aria-label="Cambiar tema"
              class="p-1.5 sm:p-2 rounded-lg text-slate-600 hover:text-tsc-700 hover:bg-tsc-50 transition-colors dark:text-slate-300 dark:hover:text-tsc-300 dark:hover:bg-slate-800"
            >
              <svg
                class="w-4 h-4 sm:w-5 sm:h-5 dark:hidden"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 3v1.5m0 15V21m9-9h-1.5M4.5 12H3m15.364 6.364l-1.06-1.06M6.697 6.697l-1.06-1.06m12.727 0l-1.06 1.06M6.697 17.303l-1.06 1.06M16.5 12a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"
                />
              </svg>
              <svg
                class="w-4 h-4 sm:w-5 sm:h-5 hidden dark:block"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"
                />
              </svg>
            </button>
          </li>
        </ul>
      </nav>
    </header>

    <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-8">
      {% block content %}{% endblock %}
    </main>

    <footer
      class="bg-white border-t border-slate-200 mt-auto dark:bg-slate-900 dark:border-slate-800"
    >
      <div
        class="max-w-5xl mx-auto px-4 py-5 text-center text-sm text-slate-500 dark:text-slate-400"
      >
        <p>
          Espacio TSC - Apoyo para estudiantes en práctica clínica de Trabajo
          Social
        </p>
        <p class="mt-1 text-xs text-slate-400 dark:text-slate-500">
          Este espacio es confidencial y de uso exclusivo para estudiantes.
        </p>
        <p class="mt-2 text-xs text-slate-400 dark:text-slate-500">
          Desarrollado por
          <a
            href="https://github.com/Dheamm"
            target="_blank"
            rel="noopener noreferrer"
            class="text-tsc-600 hover:text-tsc-800 font-medium dark:text-tsc-400 dark:hover:text-tsc-300"
            >Ítalo Osorio</a
          >
        </p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js"></script>
    <script>
      twemoji.parse(document.body, { folder: "svg", ext: ".svg" });
    </script>
    <script src="/js/theme-toggle.js" defer></script>
  </body>
</html>
