<div
  class="fade-in pl-4 border-l-2 border-tsc-200"
  id="reply-wrapper-{{ reply.id }}"
>
  <div id="post-body-{{ reply.id }}">
    <div class="flex items-center justify-between mb-1">
      <span
        class="text-xs font-semibold text-slate-500 bg-white px-2 py-0.5 rounded-full border border-slate-200"
        >{{ reply.alias }}</span
      >
      <span class="text-xs text-slate-400">{{ reply.created_at }}</span>
    </div>
    <p class="text-sm text-slate-700 leading-relaxed break-words">
      {{ reply.content }}
    </p>
    {% if reply.is_owner %}
    <div class="flex gap-3 mt-1">
      <button
        hx-get="/foro/post/{{ reply.id }}/editar"
        hx-target="#post-body-{{ reply.id }}"
        hx-swap="outerHTML"
        class="text-xs font-semibold text-tsc-600 hover:text-tsc-800"
      >
        Editar
      </button>
      <button
        hx-post="/foro/post/{{ reply.id }}/eliminar"
        hx-target="#reply-wrapper-{{ reply.id }}"
        hx-swap="delete"
        hx-confirm="¿Seguro que quieres eliminar esta respuesta?"
        class="text-xs font-semibold text-red-500 hover:text-red-700"
      >
        Eliminar
      </button>
    </div>
    {% endif %}
  </div>
</div>
