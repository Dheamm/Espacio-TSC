<div
  class="fade-in pl-4 border-l-2 border-tsc-200 dark:border-tsc-800"
  id="reply-wrapper-{{ reply.id }}"
>
  <div id="post-body-{{ reply.id }}">
    <div class="flex items-center justify-between mb-1">
      <span
        class="text-xs font-semibold text-slate-500 bg-white px-2 py-0.5 rounded-full border border-slate-200 dark:bg-slate-900 dark:border-slate-600 dark:text-slate-400"
        >{{ reply.alias }}</span
      >
      <span class="text-xs text-slate-400 dark:text-slate-500">
        {{ reply.created_at }} {% if reply.is_edited %}
        <span class="relative inline-block group">
          <span class="cursor-help">· editado</span>
          <div
            class="hidden group-hover:block absolute z-20 bottom-full right-0 mb-2 w-56 max-w-[70vw] rounded-lg bg-slate-800 text-white text-xs p-2 shadow-lg text-left dark:bg-slate-700"
          >
            Editado el {{ reply.edited_at }}. Antes decía: {{
            reply.previous_content }}
          </div>
        </span>
        {% endif %}
      </span>
    </div>
    <p
      class="text-sm text-slate-700 leading-relaxed break-words dark:text-slate-300"
    >
      {{ reply.content }}
    </p>
    {% if reply.is_owner %}
    <div class="flex gap-3 mt-1">
      <button
        hx-get="/foro/post/{{ reply.id }}/editar"
        hx-target="#post-body-{{ reply.id }}"
        hx-swap="outerHTML"
        class="text-xs font-semibold text-tsc-600 hover:text-tsc-800 dark:text-tsc-400 dark:hover:text-tsc-300"
      >
        Editar
      </button>
      <button
        hx-post="/foro/post/{{ reply.id }}/eliminar"
        hx-target="#reply-wrapper-{{ reply.id }}"
        hx-swap="delete"
        hx-confirm="¿Seguro que quieres eliminar esta respuesta?"
        class="text-xs font-semibold text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300"
      >
        Eliminar
      </button>
    </div>
    {% endif %}
  </div>
</div>
