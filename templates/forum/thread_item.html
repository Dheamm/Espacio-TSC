<div
  class="bg-white rounded-2xl border border-slate-200 shadow-sm fade-in"
  id="thread-{{ thread.post.id }}"
>
  <div class="p-5" id="post-body-{{ thread.post.id }}">
    <div class="flex items-center justify-between mb-3">
      <span
        class="text-xs font-semibold text-tsc-600 bg-tsc-50 px-2.5 py-1 rounded-full"
        >{{ thread.post.alias }}</span
      >
      <span class="text-xs text-slate-400">{{ thread.post.created_at }}</span>
    </div>
    <p class="text-slate-800 text-sm leading-relaxed break-words">
      {{ thread.post.content }}
    </p>
    {% if thread.post.is_owner %}
    <div class="flex gap-3 mt-3">
      <button
        hx-get="/foro/post/{{ thread.post.id }}/editar"
        hx-target="#post-body-{{ thread.post.id }}"
        hx-swap="outerHTML"
        class="text-xs font-semibold text-tsc-600 hover:text-tsc-800"
      >
        Editar
      </button>
      <button
        hx-post="/foro/post/{{ thread.post.id }}/eliminar"
        hx-target="#thread-{{ thread.post.id }}"
        hx-swap="delete"
        hx-confirm="¿Seguro que quieres eliminar esta publicación?"
        class="text-xs font-semibold text-red-500 hover:text-red-700"
      >
        Eliminar
      </button>
    </div>
    {% endif %}
  </div>

  {% if !thread.replies.is_empty() %}
  <div
    id="replies-{{ thread.post.id }}"
    class="border-t border-slate-100 bg-slate-50 rounded-b-2xl px-5 py-4 space-y-4"
  >
    {% for reply in thread.replies %} {% include "forum/reply_item.html" %} {%
    endfor %}
  </div>
  {% else %}
  <div
    id="replies-{{ thread.post.id }}"
    class="border-t border-slate-100 bg-slate-50 rounded-b-2xl px-5 py-3 space-y-4"
  ></div>
  {% endif %}

  <div class="px-5 pb-4">
    <form
      hx-post="/foro/reply"
      hx-target="#replies-{{ thread.post.id }}"
      hx-swap="beforeend"
      hx-indicator="#reply-spinner-{{ thread.post.id }}"
      hx-on::after-request="this.reset()"
      class="flex gap-2 mt-3"
    >
      <input type="hidden" name="parent_id" value="{{ thread.post.id }}" />
      <input
        type="text"
        name="content"
        required
        maxlength="1000"
        placeholder="Responder anónimamente..."
        class="flex-1 text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-tsc-300 placeholder-slate-400"
      />
      <button
        type="submit"
        class="text-sm font-semibold text-tsc-600 hover:text-tsc-800 px-3 py-2 rounded-lg hover:bg-tsc-50 transition-colors whitespace-nowrap"
      >
        Responder
      </button>
      <span
        id="reply-spinner-{{ thread.post.id }}"
        class="htmx-indicator text-xs text-slate-400 self-center"
        >...</span
      >
    </form>
  </div>
</div>
