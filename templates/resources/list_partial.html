{% if recursos.is_empty() %}
<div class="text-center py-14 text-slate-400">
  <p class="font-medium">No se encontraron recursos.</p>
  <p class="text-sm mt-1">Intenta con otros términos de búsqueda.</p>
</div>
{% else %}
<div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
  {% for r in recursos %}
  <a
    href="{{ r.file_url }}"
    target="_blank"
    rel="noopener noreferrer"
    class="bg-white rounded-2xl border border-slate-200 p-5 hover:shadow-md hover:border-tsc-300 transition-all group flex flex-col"
  >
    <div class="flex items-start justify-between mb-3">
      <span
        class="text-xs font-semibold text-tsc-600 bg-tsc-50 px-2.5 py-1 rounded-full"
        >{{ r.category }}</span
      >
      <span
        class="text-slate-400 group-hover:text-tsc-500 transition-colors text-sm"
        >↗</span
      >
    </div>
    <h3
      class="font-semibold text-slate-800 text-sm mb-2 group-hover:text-tsc-700 transition-colors leading-snug"
    >
      {{ r.title }}
    </h3>
    <p class="text-xs text-slate-500 leading-relaxed flex-1">
      {{ r.description }}
    </p>
    <div class="mt-3 pt-3 border-t border-slate-100">
      <span class="text-xs text-tsc-600 font-medium group-hover:underline"
        >Descargar documento →</span
      >
    </div>
  </a>
  {% endfor %}
</div>
{% endif %}
